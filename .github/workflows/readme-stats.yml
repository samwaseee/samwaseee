name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create stats folder if missing
        run: mkdir -p stats

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=samwaseee&show_icons=true&theme=monokai
          path: stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=samwaseee&layout=donut&theme=monokai
          path: stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate WakaTime card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=samwasee&theme=monokai
          path: stats/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Trophies card safely
        run: |
          # Try to download the file, retry up to 3 times if it fails
          curl --fail --retry 3 -s "https://github-profile-trophy.vercel.app/?username=samwaseee&theme=monokai&rank=-?" -o stats/temp_trophies.svg || true
          
          # Check if the downloaded file actually contains SVG code
          if grep -q "<svg" stats/temp_trophies.svg; then
            mv stats/temp_trophies.svg stats/trophies.svg
            echo "Trophies updated successfully!"
          else
            echo "Server timeout. Keeping the previous trophies image."
            rm -f stats/temp_trophies.svg
          fi

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats/*.svg
          git commit -m "Update README cards" || exit 0
          git pull --rebase
          git push
